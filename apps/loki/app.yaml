---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  sources:
   - repoURL: https://grafana.github.io/helm-charts
     chart: helm-loki
     targetRevision: 6.51.0
     helm:
      valueFiles:
        - $values/values/loki/values.yaml
   - repoURL: https://github.com/marcpires/infra-lhc.git
     targetRevision: feat/35-install-defaults
     ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
