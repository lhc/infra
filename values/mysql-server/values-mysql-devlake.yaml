mysql:
  resources:
    requests:
      memory: 2Gi
    limits:
      memory: 4Gi

affinity:
  antiAffinityTopologyKey: "kubernetes.io/hostname"
  advanced:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - marcbook
